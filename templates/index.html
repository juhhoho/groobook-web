<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그루북 업무 자동화</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 class="logo">그루북</h1>
      <p class="subtitle">업무 자동화 시스템</p>
    </header>
    <main>
      <div class="card-grid">
        <a href="/packaging" class="card">
          <div class="card-icon">📦</div>
          <div class="card-title">포장전표</div>
          <div class="card-desc">내신노트 · 분기별교재 · 중간기말교재</div>
        </a>
        <!-- 향후 추가될 자동화 항목 -->
        <div class="card card-disabled">
          <div class="card-icon">🔒</div>
          <div class="card-title">준비 중</div>
          <div class="card-desc">추후 추가 예정</div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
