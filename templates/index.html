<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그루북 업무 자동화</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout-btn {
      padding: 8px 16px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .logout-btn:hover {
      background: #efefef;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1 class="logo">그루북</h1>
        <p class="subtitle">업무 자동화 시스템</p>
      </div>
      <form action="/logout" method="post" style="margin: 0;">
        <button type="submit" class="logout-btn">로그아웃</button>
      </form>
    </header>
    <main>
      <div class="card-grid">
        <a href="/packaging" class="card">
          <div class="card-icon">📦</div>
          <div class="card-title">포장전표</div>
          <div class="card-desc">내신노트 · 분기별교재 · 중간기말교재</div>
        </a>
        <a href="/email" class="card">
          <div class="card-icon">📧</div>
          <div class="card-title">청구서 메일 발송</div>
          <div class="card-desc">캠퍼스별 청구서 자동 발송</div>
        </a>
      </div>
    </main>
  </div>
</body>
</html>
