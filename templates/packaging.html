<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포장전표 - 그루북</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="back-btn">← 홈</a>
      <h1 class="logo">포장전표</h1>
      <p class="subtitle">작업 유형을 선택하세요</p>
    </header>
    <main>
      <div class="card-grid">
        <a href="/naeshin" class="card">
          <div class="card-icon">📓</div>
          <div class="card-title">내신노트</div>
          <div class="card-desc">비법전수 내신노트 포장전표 생성<br>밴딩: 30개 고정</div>
        </a>
        <a href="/quarterly" class="card">
          <div class="card-icon">📚</div>
          <div class="card-title">분기별교재</div>
          <div class="card-desc">분기별 교재 포장전표 생성<br>밴딩: 파일에서 자동 읽기</div>
        </a>
        <a href="/midterm" class="card">
          <div class="card-icon">📝</div>
          <div class="card-title">중간기말교재</div>
          <div class="card-desc">중간/기말고사 교재 포장전표 생성<br>본책 · 미니북 · 교사용</div>
        </a>
      </div>
    </main>
  </div>
</body>
</html>
