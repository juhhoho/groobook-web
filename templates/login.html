<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 그루북 업무 자동화</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 380px;
      padding: 40px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      color: #333;
    }

    .login-header p {
      margin: 0;
      font-size: 14px;
      color: #666;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }

    .form-group input {
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group button {
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }

    .form-group button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .form-group button:active {
      transform: translateY(0);
    }

    .error-message {
      padding: 12px;
      background: #fee;
      color: #c33;
      border-radius: 6px;
      font-size: 14px;
      margin-top: 8px;
    }

    .info-message {
      padding: 12px;
      background: #f0f4ff;
      color: #667eea;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>그루북</h1>
      <p>업무 자동화 시스템</p>
    </div>

    <form method="post" class="login-form">
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="비밀번호를 입력하세요"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <button type="submit">로그인</button>
      </div>

      {% if error %}
      <div class="error-message">{{ error }}</div>
      {% endif %}
    </form>

    <div class="info-message">
      직원 전용 시스템입니다.
    </div>
  </div>
</body>
</html>
