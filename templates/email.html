<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>청구서 메일 발송 - 그루북</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container container-narrow">
    <header>
      <a href="/" class="back-btn">← 메인</a>
      <h1 class="logo">청구서 메일 발송</h1>
    </header>
    <main>

      <!-- Step 1: 파일 업로드 + 스캔 -->
      <div id="stepScan">
        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" accept=".xlsx" multiple hidden>
          <div class="upload-content" id="uploadContent">
            <div class="upload-icon">📂</div>
            <p class="upload-text">청구서 파일을 드래그하거나 클릭하여 선택</p>
            <p class="upload-hint">.xlsx 파일 여러 개 동시 선택 가능</p>
            <p class="upload-hint">파일명 형식: YYYY년 MM월 캠퍼스명 청구서_내신교재.xlsx</p>
          </div>
          <div class="upload-selected" id="uploadSelected" style="display:none;">
            <div class="upload-icon">✅</div>
            <p class="upload-filename" id="uploadFilename"></p>
            <p class="upload-hint">다른 파일로 변경하려면 클릭</p>
          </div>
        </div>

        <button class="btn-primary" id="scanBtn" disabled>파일 스캔</button>

        <div class="error-section" id="scanError" style="display:none;">
          <div class="error-icon">⚠️</div>
          <p class="error-msg" id="scanErrorMsg"></p>
        </div>
      </div>

      <!-- Step 2: 스캔 결과 + 발송 -->
      <div id="stepSend" style="display:none;">
        <h3 class="section-title">스캔 결과</h3>
        <div class="table-wrap">
          <table class="preview-table" id="previewTable">
            <thead>
              <tr>
                <th>년도</th>
                <th>월</th>
                <th>캠퍼스</th>
                <th>파일 유형</th>
                <th>수신 이메일</th>
              </tr>
            </thead>
            <tbody id="previewBody"></tbody>
          </table>
        </div>

        <div class="banding-section">
          <h3 class="section-title">추가 메시지 (선택)</h3>
          <textarea id="additionalMsg" class="msg-textarea" rows="4" placeholder="이메일 본문에 추가할 메시지를 입력하세요."></textarea>
        </div>

        <div class="btn-row">
          <button class="btn-secondary" id="rescanBtn">다시 스캔</button>
          <button class="btn-primary" id="sendBtn">메일 발송</button>
        </div>
      </div>

      <!-- 진행률 -->
      <div class="progress-section" id="progressSection" style="display:none;">
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar" style="width:0%"></div>
        </div>
        <p class="progress-msg" id="progressMsg">준비 중...</p>
      </div>

      <!-- 완료 결과 -->
      <div class="download-section" id="resultSection" style="display:none;">
        <div class="success-icon">🎉</div>
        <p class="success-msg" id="resultMsg"></p>
        <div id="errorList" style="display:none;">
          <p class="error-msg" id="errorListMsg"></p>
        </div>
        <button class="btn-secondary" onclick="resetAll()">처음으로</button>
      </div>

      <!-- 에러 -->
      <div class="error-section" id="errorSection" style="display:none;">
        <div class="error-icon">⚠️</div>
        <p class="error-msg" id="errorMsg"></p>
        <button class="btn-secondary" onclick="resetAll()">다시 시도</button>
      </div>

    </main>
  </div>

  <!-- 메일 미리보기 모달 -->
  <div id="previewModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3>메일 미리보기</h3>
      <p class="modal-subtitle">아래 내용으로 <strong id="previewCount">0</strong>개 캠퍼스에 메일이 발송됩니다.</p>

      <div class="preview-email">
        <div class="preview-field">
          <span class="label">제목</span>
          <span class="preview-content" style="color: #666; font-style: italic;">캠퍼스마다 개별 제목으로 발송됩니다</span>
        </div>
        <div class="preview-field">
          <span class="label">본문</span>
          <pre id="modalPreviewBody" class="preview-content"></pre>
        </div>
      </div>

      <div class="preview-targets">
        <p class="label">발송 대상</p>
        <ul id="previewTargetList"></ul>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" id="modalCancelBtn">취소</button>
        <button class="btn-primary" id="modalConfirmBtn">발송 확인</button>
      </div>
    </div>
  </div>

  <script>
    let selectedFiles = [];
    let scanId = null;
    let pollTimer = null;
    let previewRows = [];
    let pendingAdditionalMsg = '';

    // 업로드 영역 클릭
    document.getElementById('uploadArea').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });

    // 드래그앤드롭
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      setFiles(Array.from(e.dataTransfer.files));
    });

    document.getElementById('fileInput').addEventListener('change', e => {
      setFiles(Array.from(e.target.files));
    });

    function setFiles(files) {
      selectedFiles = files.filter(f => f.name.endsWith('.xlsx'));
      if (selectedFiles.length === 0) return;
      document.getElementById('uploadContent').style.display = 'none';
      document.getElementById('uploadSelected').style.display = 'flex';
      document.getElementById('uploadFilename').textContent =
        selectedFiles.length === 1
          ? selectedFiles[0].name
          : `${selectedFiles.length}개 파일 선택됨`;
      document.getElementById('scanBtn').disabled = false;
      document.getElementById('scanError').style.display = 'none';
    }

    // 스캔
    document.getElementById('scanBtn').addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;

      const formData = new FormData();
      selectedFiles.forEach(f => formData.append('files', f));

      document.getElementById('scanBtn').disabled = true;
      document.getElementById('scanError').style.display = 'none';

      try {
        const res = await fetch('/api/email/scan', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) {
          document.getElementById('scanErrorMsg').textContent = data.detail || '스캔 실패';
          document.getElementById('scanError').style.display = 'flex';
          document.getElementById('scanBtn').disabled = false;
          return;
        }

        scanId = data.scan_id;
        previewRows = data.preview;
        renderPreview(data.preview);
        document.getElementById('stepScan').style.display = 'none';
        document.getElementById('stepSend').style.display = 'block';
      } catch (err) {
        document.getElementById('scanErrorMsg').textContent = '서버 연결에 실패했습니다.';
        document.getElementById('scanError').style.display = 'flex';
        document.getElementById('scanBtn').disabled = false;
      }
    });

    function renderPreview(preview) {
      const tbody = document.getElementById('previewBody');
      tbody.innerHTML = '';
      preview.forEach(item => {
        const tr = document.createElement('tr');
        const emailCell = item.email === '이메일 없음'
          ? `<td class="email-missing">${item.email}</td>`
          : `<td>${item.email}</td>`;
        tr.innerHTML = `
          <td>${item.year}</td>
          <td>${item.month}</td>
          <td>${item.campus}</td>
          <td>${item.file_type}</td>
          ${emailCell}
        `;
        tbody.appendChild(tr);
      });
    }

    // 다시 스캔
    document.getElementById('rescanBtn').addEventListener('click', () => {
      scanId = null;
      selectedFiles = [];
      document.getElementById('uploadContent').style.display = 'flex';
      document.getElementById('uploadSelected').style.display = 'none';
      document.getElementById('scanBtn').disabled = true;
      document.getElementById('fileInput').value = '';
      document.getElementById('stepSend').style.display = 'none';
      document.getElementById('stepScan').style.display = 'block';
    });

    // 메일 발송 (미리보기 모달 표시)
    document.getElementById('sendBtn').addEventListener('click', () => {
      if (!scanId) return;
      pendingAdditionalMsg = document.getElementById('additionalMsg').value;
      showPreviewModal(pendingAdditionalMsg);
    });

    // 모달 취소
    document.getElementById('modalCancelBtn').addEventListener('click', () => {
      document.getElementById('previewModal').style.display = 'none';
    });

    // 모달 확인 (실제 발송 수행)
    document.getElementById('modalConfirmBtn').addEventListener('click', async () => {
      document.getElementById('previewModal').style.display = 'none';

      const formData = new FormData();
      formData.append('scan_id', scanId);
      formData.append('additional_msg', pendingAdditionalMsg);

      document.getElementById('stepSend').style.display = 'none';
      document.getElementById('progressSection').style.display = 'block';

      try {
        const res = await fetch('/api/email/send', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || '발송 실패');
          return;
        }

        pollProgress(data.task_id);
      } catch (err) {
        showError('서버 연결에 실패했습니다.');
      }
    });

    function buildEmailBody(year, month, additionalMsg) {
      let body = `안녕하세요.\n그루북 정세동 실장입니다.\n\n${year}년 ${month}월 청구서를 보내드리니 확인 바랍니다.\n보시고 수정 사항이 있을 경우, 알려주시면 반영하도록 하겠습니다.`;
      if (additionalMsg.trim()) {
        body += `\n\n${additionalMsg.trim()}`;
      }
      body += `\n\n감사합니다.\n\n그루북 정세동 드림`;
      return body;
    }

    function showPreviewModal(additionalMsg) {
      if (previewRows.length === 0) return;

      // 고유 캠퍼스 그룹 추출
      const groupMap = {};
      previewRows.forEach(row => {
        const key = `${row.year}_${row.month}_${row.campus}`;
        if (!groupMap[key]) {
          groupMap[key] = {
            year: row.year,
            month: row.month,
            campus: row.campus,
            email: row.email
          };
        }
      });
      const groupList = Object.values(groupMap);

      // 첫 번째 그룹으로 본문 미리보기
      const first = groupList[0];
      document.getElementById('modalPreviewBody').textContent = buildEmailBody(first.year, first.month, additionalMsg);
      document.getElementById('previewCount').textContent = groupList.length;

      // 발송 대상 목록 (캠퍼스마다 제목 표시)
      const targetList = document.getElementById('previewTargetList');
      targetList.innerHTML = '';
      groupList.forEach(group => {
        const li = document.createElement('li');
        const campusSubject = `그루북 ${group.year}년 ${group.month}월 청구서_${group.campus}`;
        if (group.email === '이메일 없음') {
          li.innerHTML = `<div style="font-weight: bold; margin-bottom: 4px;">${group.campus}</div>
                          <div style="font-size: 12px; color: #888; margin-bottom: 6px;">${campusSubject}</div>
                          <div style="color: #e74c3c; font-weight: bold;">${group.email}</div>`;
        } else {
          li.innerHTML = `<div style="font-weight: bold; margin-bottom: 4px;">${group.campus}</div>
                          <div style="font-size: 12px; color: #888; margin-bottom: 6px;">${campusSubject}</div>
                          <div>${group.email}</div>`;
        }
        targetList.appendChild(li);
      });

      // 모달 표시
      document.getElementById('previewModal').style.display = 'flex';
    }

    function pollProgress(taskId) {
      const bar = document.getElementById('progressBar');
      const msg = document.getElementById('progressMsg');
      bar.classList.add('processing');
      msg.classList.add('spinning');

      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(`/api/progress/${taskId}`);
          const data = await res.json();

          bar.style.width = data.progress + '%';
          msg.textContent = data.message;

          if (data.status === 'done') {
            clearInterval(pollTimer);
            bar.classList.remove('processing');
            msg.classList.remove('spinning');
            showResult(data);
          } else if (data.status === 'error') {
            clearInterval(pollTimer);
            bar.classList.remove('processing');
            msg.classList.remove('spinning');
            showError(data.error || '발송 중 오류가 발생했습니다.');
          }
        } catch {
          clearInterval(pollTimer);
          bar.classList.remove('processing');
          msg.classList.remove('spinning');
          showError('서버 연결이 끊어졌습니다.');
        }
      }, 800);
    }

    function showResult(data) {
      document.getElementById('progressSection').style.display = 'none';
      document.getElementById('resultSection').style.display = 'flex';

      const result = data.email_result || {};
      const success = result.success ?? 0;
      const fail = result.fail ?? 0;
      document.getElementById('resultMsg').textContent = `발송 완료! 성공 ${success}건, 실패 ${fail}건`;

      if (result.errors && result.errors.length > 0) {
        document.getElementById('errorList').style.display = 'block';
        document.getElementById('errorListMsg').textContent = result.errors.join('\n');
      }
    }

    function showError(msg) {
      document.getElementById('progressSection').style.display = 'none';
      document.getElementById('stepScan').style.display = 'none';
      document.getElementById('stepSend').style.display = 'none';
      document.getElementById('errorSection').style.display = 'flex';
      document.getElementById('errorMsg').textContent = msg;
    }

    function resetAll() {
      scanId = null;
      selectedFiles = [];
      previewRows = [];
      pendingAdditionalMsg = '';
      if (pollTimer) clearInterval(pollTimer);
      document.getElementById('uploadContent').style.display = 'flex';
      document.getElementById('uploadSelected').style.display = 'none';
      document.getElementById('scanBtn').disabled = true;
      document.getElementById('fileInput').value = '';
      document.getElementById('additionalMsg').value = '';
      document.getElementById('progressBar').style.width = '0%';
      document.getElementById('stepScan').style.display = 'block';
      document.getElementById('stepSend').style.display = 'none';
      document.getElementById('progressSection').style.display = 'none';
      document.getElementById('resultSection').style.display = 'none';
      document.getElementById('errorSection').style.display = 'none';
      document.getElementById('scanError').style.display = 'none';
      document.getElementById('errorList').style.display = 'none';
      document.getElementById('previewModal').style.display = 'none';
    }
  </script>
</body>
</html>
